version: "3.8"

services:
  rabbit:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  order-db:
    image: mongo
    ports:
      - "27017:27017"

  payment-db:
    image: mongo
    ports:
      - "27018:27017"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - rabbit
      - order-db

  payment-service:
    build: 
      context: .
      dockerfile: payment-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbit
      - payment-db

  notification-service:
    build: 
      context: .
      dockerfile: notification-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbit

  order-status-updater:
    build: 
      context: .
      dockerfile: order-status-updater/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbit
      - order-db
  
  api-gateway:
    build: 
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - order-service